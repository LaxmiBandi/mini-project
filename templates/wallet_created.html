<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ user_type }} Wallet Created</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card p-4 shadow" style="max-width: 500px; width: 100%;">
        <h3 class="text-center text-success mb-4">{{ user_type }} Wallet Created!</h3>
        <p><strong>Name:</strong> {{ name }}</p>
        <p><strong>Wallet Address:</strong> {{ wallet_address }}</p>
        <p><strong>Private Key:</strong> <span id="privateKey">{{ private_key }}</span></p>

        <button class="btn btn-primary w-100 mb-2" id="downloadBtn">Download Wallet Info</button>
        <a href="{{ url_for('index') }}" class="btn btn-success w-100">Go to Home</a>
    </div>
</div>

<script>
document.getElementById("downloadBtn").addEventListener("click", function() {
    const name = "{{ name }}";
    const address = "{{ wallet_address }}";
    const privateKey = "{{ private_key }}";

    const data = `Name: ${name}\nWallet Address: ${address}\nPrivate Key: ${privateKey}`;
    const blob = new Blob([data], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = `${name}_wallet_info.txt`;
    a.click();
    URL.revokeObjectURL(url);
});
</script>
</body>
</html>
