<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify Product - Farm to Plate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card p-4 shadow">
      <h3 class="text-success mb-4">Verify Cereal Product</h3>

      <form id="verifyForm">
        <input id="product_id" class="form-control mb-3" placeholder="Enter Product Blockchain ID" required>
        <button type="submit" class="btn btn-success w-100">Verify Product</button>
      </form>

      <div id="msg" class="mt-3"></div>
      <div id="productInfo" class="mt-4" style="display:none;"></div>
    </div>
  </div>

  <script>
  document.getElementById("verifyForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const product_id = document.getElementById("product_id").value.trim();
    document.getElementById("msg").innerHTML = `<div class='alert alert-info'>⏳ Verifying product on blockchain...</div>`;
    document.getElementById("productInfo").style.display = "none";

    try {
      const res = await fetch("/verify_product", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ product_id })
      });
      const data = await res.json();

      if (res.ok) {
        document.getElementById("msg").innerHTML = `<div class='alert alert-success'>✅ Product verified successfully!</div>`;
        const info = data.product || {};

        document.getElementById("productInfo").style.display = "block";
        document.getElementById("productInfo").innerHTML = `
          <div class="card p-3 shadow-sm">
            <h5 class="text-success">${info.name || "Unknown Product"}</h5>
            <p><b>Blockchain ID:</b> ${product_id}</p>
            <p><b>Farmer:</b> ${info.farmer_name || "N/A"}</p>
            <p><b>Price:</b> ${info.price ? info.price + " ETH" : "N/A"}</p>
            <p><b>Description:</b> ${info.description || "No description provided"}</p>
            <hr>
            <p><b>🌾 Pesticide Certificate ID:</b> ${info.pesticideCertificateId || "<span class='text-danger'>Not provided</span>"}</p>
            <p><b>🚚 Delivery Certificate ID:</b> ${info.deliveryCertificateId || "<span class='text-danger'>Not provided</span>"}</p>
          </div>
        `;
      } else {
        document.getElementById("msg").innerHTML = `<div class='alert alert-danger'>❌ ${data.error}</div>`;
      }
    } catch (err) {
      console.error(err);
      document.getElementById("msg").innerHTML = `<div class='alert alert-danger'>Failed to verify product</div>`;
    }
  });
  </script>
</body>
</html>
