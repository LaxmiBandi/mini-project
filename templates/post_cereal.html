<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post Cereal - Farm to Plate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card p-4 shadow">
      <h3 class="text-success mb-3">Post Cereal Product</h3>

      <!-- Existing form to post cereal -->
      <form id="cerealForm">
        <input id="name" class="form-control mb-3" placeholder="Cereal Name" required>
        <input id="quantity" type="number" class="form-control mb-3" placeholder="Quantity (kg)" required>
        <input id="price" type="number" class="form-control mb-3" placeholder="Price per kg" required>
        <textarea id="description" class="form-control mb-3" placeholder="Description"></textarea>
        <button type="submit" class="btn btn-success w-100">Post</button>
      </form>

      <div id="msg" class="mt-3"></div>

      <!-- ✅ Updated Certificates Section -->
      

    </div>
  </div>

  <script>
  // --- Existing Cereal Posting Logic ---
  document.getElementById("cerealForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const submitBtn = e.target.querySelector("button[type='submit']");
      submitBtn.disabled = true;

      const name = document.getElementById("name").value.trim();
      const qty = Number(document.getElementById("quantity").value);
      const price = Number(document.getElementById("price").value);
      const desc = document.getElementById("description").value.trim();

      document.getElementById("msg").innerHTML = `<div class='alert alert-info'>⏳ Posting cereal...</div>`;

      try {
          const res = await fetch("/save_cereal", {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({name, qty, price, desc})
          });

          const data = await res.json();

          if (res.ok) {
              document.getElementById("msg").innerHTML = `<div class='alert alert-success'>
                  ✅ ${data.message}<br>🔗 Tx Hash: ${data.tx_hash}<br>🆔 Blockchain ID: ${data.blockchain_id}
              </div>`;
              document.getElementById("cerealForm").reset();
              loadFarmerProducts(); // refresh dropdown
          } else {
              document.getElementById("msg").innerHTML = `<div class='alert alert-danger'>❌ ${data.error}</div>`;
          }

      } catch (err) {
          console.error("❌ Error:", err);
          document.getElementById("msg").innerHTML = `<div class='alert alert-danger'>Failed to reach server</div>`;
      } finally {
          submitBtn.disabled = false;
      }
  });

 
  // --- 🔄 Load Farmer Products into Dropdown ---
  async function loadFarmerProducts() {
    try {
      const res = await fetch("/get_farmer_products");
      const data = await res.json();
      const dropdown = document.getElementById("product_id");

      // clear existing options
      dropdown.innerHTML = `<option value="">Select your product</option>`;

      data.products.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.blockchain_id;
        opt.textContent = `${p.name} (ID: ${p.blockchain_id})`;
        dropdown.appendChild(opt);
      });
    } catch (err) {
      console.error("Error loading products:", err);
    }
  }

  // load products on page load
  window.onload = loadFarmerProducts;
  </script>
</body>
</html>
